<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活力早餐點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase 核心與資料庫 SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 防止點選文字藍色高亮 */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 pb-24">
    <!-- 頂部導覽列 -->
    <nav class="bg-white shadow-sm sticky top-0 z-40 p-4">
        <div class="flex justify-between items-center container mx-auto">
            <h1 class="text-xl font-black text-orange-500">🍳 活力早餐</h1>
            <div id="shop-status-tag" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-400">連線中...</div>
        </div>
    </nav>

    <div class="container mx-auto p-4 flex flex-col lg:flex-row gap-6">
        <!-- 左側：菜單區 -->
        <div class="lg:w-2/3">
            <div id="category-tabs" class="flex gap-2 overflow-x-auto no-scrollbar mb-6 py-2 sticky top-16 bg-gray-50 z-30"></div>
            <div id="menu-display" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- 右側：購物車與我的訂單 -->
        <div class="lg:w-1/3 space-y-6">
            <!-- 購物車 -->
            <div class="bg-white rounded-2xl shadow-md p-5 border border-orange-100">
                <h2 class="font-bold text-lg mb-4 flex justify-between items-center">
                    🛒 我的購物車 <span id="cart-count" class="text-sm bg-orange-100 text-orange-600 px-2 py-1 rounded-lg">0 份</span>
                </h2>
                <div id="cart-list" class="space-y-3 mb-6 min-h-[50px]"></div>
                <div class="border-t pt-4">
                    <div class="flex justify-between items-center mb-4 text-xl font-black">
                        <span>總計</span>
                        <span class="text-orange-600">$<span id="cart-total">0</span></span>
                    </div>
                    <button id="submit-btn" onclick="sendOrder()" disabled class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-orange-200 disabled:bg-gray-300 transition-all">
                        請先點餐
                    </button>
                </div>
            </div>

            <!-- 我的訂單紀錄 (僅顯示這台手機的) -->
            <div class="bg-white rounded-2xl shadow-md p-5 border">
                <h2 class="font-bold text-gray-700 mb-4 text-sm flex items-center gap-2">
                    <span class="w-2 h-2 bg-orange-500 rounded-full"></span> 您的今日訂單紀錄
                </h2>
                <div id="history-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- 訂單完成彈窗 -->
    <div id="success-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="text-6xl mb-4">✅</div>
            <h3 class="text-2xl font-black mb-2">訂單已送出</h3>
            <p class="text-gray-500 mb-6">您的取餐號碼為</p>
            <div id="order-number-display" class="text-5xl font-black text-orange-500 mb-8">#000</div>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">好的，我知道了</button>
        </div>
    </div>

    <script>
        // 1. Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyCJ8WrgSLo2bNzYzY1MIt1EfgEcA0J6eEY",
            authDomain: "breakfast-4addd.firebaseapp.com",
            projectId: "breakfast-4addd",
            storageBucket: "breakfast-4addd.firebasestorage.app",
            messagingSenderId: "132987657144",
            appId: "1:132987657144:web:5cdfdc6214e1bec242cd4d",
            measurementId: "G-TCL5WMLMXY",
            databaseURL: "https://breakfast-4addd-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 產生存於手機的唯一 ID (確保每支手機獨立看到自己的訂單)
        function getMyUserId() {
            let uid = localStorage.getItem('breakfast_uid');
            if (!uid) {
                uid = 'user_' + Math.random().toString(36).substr(2, 9) + Date.now();
                localStorage.setItem('breakfast_uid', uid);
            }
            return uid;
        }

        // 3. 統一日期格式
        function getTodayStr() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // 4. 菜單數據
        const menuItems = [
            { id: 1, category: "蛋餅", name: "原味蛋餅", price: 25, canAdd: true },
            { id: 2, category: "蛋餅", name: "起司蛋餅", price: 30, canAdd: true }, 
            { id: 3, category: "蛋餅", name: "肉鬆蛋餅", price: 30, canAdd: true }, 
            { id: 4, category: "蛋餅", name: "玉米蛋餅", price: 30, canAdd: true }, 
            { id: 5, category: "蛋餅", name: "薯餅蛋餅", price: 35, canAdd: true }, 
            { id: 6, category: "蛋餅", name: "鮪魚蛋餅", price: 35, canAdd: true }, 
            { id: 7, category: "蛋餅", name: "豬排蛋餅", price: 40, canAdd: true }, 
            { id: 8, category: "漢堡", name: "豬排漢堡", price: 50, canAdd: true }, 
            { id: 9, category: "漢堡", name: "薯餅漢堡", price: 50, canAdd: true }, 
            { id: 10, category: "漢堡", name: "雞腿排漢堡", price: 60, canAdd: true }, 
            { id: 11, category: "漢堡", name: "卡啦雞漢堡", price: 65, canAdd: true }, 
            { id: 12, category: "點心", name: "熱狗兩隻", price: 25 }, 
            { id: 13, category: "點心", name: "荷包蛋", price: 10 }, 
            { id: 14, category: "點心", name: "麥克雞塊", price: 30 }, 
            { id: 15, category: "點心", name: "薯餅一片", price: 15 }, 
            { id: 16, category: "飲料", name: "紅茶", price: 20, isDrink: true }, 
            { id: 18, category: "飲料", name: "豆漿", price: 20, isDrink: true }, 
            { id: 20, category: "飲料", name: "豆漿紅茶", price: 25, isDrink: true }, 
            { id: 22, category: "飲料", name: "奶茶", price: 25, isDrink: true }, 
            { id: 24, category: "飲料", name: "鮮奶茶", price: 30, isDrink: true }
        ];

        let cart = []; 
        let currentCategory = "蛋餅";
        let shopIsOpen = true;

        window.onload = () => { 
            renderCategoryTabs(); 
            renderMenu(); 
            checkShopStatus(); 
            syncMyHistory(); 
        };

        // 監控店家營業狀態
        function checkShopStatus() {
            db.ref('shop_config').on('value', (snapshot) => {
                const config = snapshot.val() || { isOpen: true };
                shopIsOpen = config.isOpen;
                const btn = document.getElementById('submit-btn');
                const tag = document.getElementById('shop-status-tag');
                if (shopIsOpen) {
                    btn.innerText = cart.length > 0 ? "確認送出訂單" : "請先點餐";
                    tag.innerText = "● 營業中"; 
                    tag.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-600";
                    if(cart.length > 0) btn.disabled = false;
                } else {
                    btn.disabled = true; btn.innerText = "休息中";
                    tag.innerText = "● 休息中"; 
                    tag.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-600";
                }
            });
        }

        // 監控歷史紀錄 (關鍵：只顯示自己的)
        function syncMyHistory() {
            const myId = getMyUserId();
            db.ref('orders').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const today = getTodayStr();
                const myOrders = Object.values(data)
                    .filter(o => o.date === today && o.userId === myId)
                    .reverse(); // 最新訂單在上

                const styles = { 
                    '已送出': 'bg-gray-100 text-gray-500', 
                    '製作中': 'bg-orange-100 text-orange-600 status-pulse', 
                    '可領取': 'bg-green-500 text-white font-black', 
                    '已領取': 'bg-slate-200 text-slate-400' 
                };

                document.getElementById('history-list').innerHTML = myOrders.map(order => `
                    <div class="bg-white p-3 rounded-lg border shadow-sm mb-2">
                        <div class="flex justify-between items-start">
                            <span class="font-black text-lg">#${order.orderNo}</span>
                            <div class="px-3 py-1 rounded-full text-[10px] font-bold ${styles[order.status] || 'bg-gray-100'}">${order.status}</div>
                        </div>
                        <div class="text-[10px] text-gray-500 mt-1 truncate">${order.items}</div>
                    </div>`).join('') || '<p class="text-gray-400 text-center py-4 text-xs">您今天還沒有點餐喔</p>';
            });
        }

        // 送出訂單 (使用 Transaction 確保編號連續不跳號)
        async function sendOrder() {
            if (!shopIsOpen) return alert("目前休息中，無法送單");
            if (cart.length === 0) return alert("購物車是空的！");

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "送出中...";

            const today = getTodayStr();
            const myId = getMyUserId();

            // 取得連續編號
            const seqRef = db.ref('last_order_seq');
            const result = await seqRef.transaction((current) => {
                if (current === null || current.date !== today) {
                    return { date: today, num: 1 };
                } else {
                    return { date: today, num: current.num + 1 };
                }
            });

            if (result.committed) {
                const nextNum = result.snapshot.val().num;
                const formattedNum = String(nextNum).padStart(3, '0');
                
                const newOrder = {
                    id: Date.now(),
                    orderNo: formattedNum,
                    date: today,
                    userId: myId, // 標記為這台手機的訂單
                    status: '已送出',
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: false}),
                    items: cart.map(i => `${i.displayName}x${i.qty}`).join(', '),
                    total: cart.reduce((s, i) => s + i.price * i.qty, 0)
                };

                await db.ref('orders').push(newOrder);
                
                document.getElementById('order-number-display').innerText = "#" + formattedNum;
                document.getElementById('success-modal').classList.remove('hidden');
                cart = []; 
                renderCart();
            } else {
                alert("送單失敗，請重試");
                btn.disabled = false;
            }
        }

        // 渲染類別按鈕
        function renderCategoryTabs() {
            const categories = [...new Set(menuItems.map(item => item.category))];
            document.getElementById('category-tabs').innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}')" class="whitespace-nowrap px-6 py-2 rounded-full font-bold transition ${currentCategory === cat ? 'bg-orange-500 text-white shadow-orange-200 shadow-lg' : 'bg-white text-gray-600 shadow-sm'}">${cat}</button>`).join('');
        }

        function filterCategory(cat) { 
            currentCategory = cat; 
            renderCategoryTabs(); 
            renderMenu(); 
        }

        // 渲染菜單
        function renderMenu() {
            const items = menuItems.filter(item => item.category === currentCategory);
            document.getElementById('menu-display').innerHTML = items.map(item => `
                <div class="bg-white rounded-2xl shadow-sm border p-4 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-gray-800 text-lg">${item.name}</h3>
                        <span class="text-orange-500 font-black text-xl">$${item.price}</span>
                        ${item.canAdd ? `
                        <div class="flex gap-2 mt-2">
                            <input type="checkbox" id="egg-${item.id}" class="hidden peer/egg">
                            <label for="egg-${item.id}" class="text-xs border px-2 py-1 rounded cursor-pointer transition peer-checked/egg:bg-orange-100 peer-checked/egg:border-orange-500 text-gray-500">加蛋+10</label>
                            <input type="checkbox" id="cheese-${item.id}" class="hidden peer/cheese">
                            <label for="cheese-${item.id}" class="text-xs border px-2 py-1 rounded cursor-pointer transition peer-checked/cheese:bg-orange-100 peer-checked/cheese:border-orange-500 text-gray-500">加起司+5</label>
                        </div>` : ''}
                    </div>
                    <div class="flex justify-end mt-4">
                        ${item.isDrink ? `
                        <div class="flex gap-2">
                            <button onclick="addDrink(${item.id}, '冰')" class="bg-blue-400 text-white px-4 py-1 rounded-lg font-bold text-sm shadow-sm">冰</button>
                            <button onclick="addDrink(${item.id}, '溫')" class="bg-red-400 text-white px-4 py-1 rounded-lg font-bold text-sm shadow-sm">溫</button>
                        </div>` : `
                        <button onclick="${item.canAdd ? `addMain(${item.id})` : `addToCartRaw(${item.id},'${item.name}',${item.price})`}" class="bg-orange-500 text-white px-6 py-1 rounded-full font-bold hover:bg-orange-600 transition shadow-md">點餐</button>
                        `}
                    </div>
                </div>`).join('');
        }

        // 處理主餐(加蛋起司)
        function addMain(id) {
            const item = menuItems.find(i => i.id === id); 
            const egg = document.getElementById(`egg-${id}`).checked; 
            const cheese = document.getElementById(`cheese-${id}`).checked;
            let name = item.name, price = item.price; 
            if(egg) { name += "(加蛋)"; price += 10; } 
            if(cheese) { name += "(加起司)"; price += 5; }
            addToCartRaw(id, name, price, (egg?'E':'')+(cheese?'C':''));
            document.getElementById(`egg-${id}`).checked = false; 
            document.getElementById(`cheese-${id}`).checked = false;
        }

        // 處理飲料
        function addDrink(id, temp) { 
            const item = menuItems.find(i => i.id === id); 
            addToCartRaw(id, `${item.name}(${temp})`, item.price, temp); 
        }

        // 加入購物車核心邏輯
        function addToCartRaw(id, displayName, price, extraKey = '') {
            const cartKey = `${id}-${extraKey}`; 
            const inCart = cart.find(c => c.cartKey === cartKey);
            if (inCart) inCart.qty++; 
            else cart.push({ cartKey, displayName, price, qty: 1 }); 
            renderCart();
        }

        function updateQty(cartKey, delta) {
            const item = cart.find(c => c.cartKey === cartKey); 
            if (!item) return;
            item.qty += delta; 
            if (item.qty < 1) cart = cart.filter(c => c.cartKey !== cartKey); 
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list'); 
            let total = 0, count = 0;
            if (cart.length === 0) { 
                list.innerHTML = '<p class="text-gray-400 text-center py-4 text-sm">尚未選擇餐點</p>'; 
                document.getElementById('cart-total').innerText = '0'; 
                document.getElementById('cart-count').innerText = "0 份"; 
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('submit-btn').innerText = "請先點餐";
                return; 
            }
            list.innerHTML = cart.map(item => {
                total += item.price * item.qty; 
                count += item.qty;
                return `
                <div class="flex flex-col border-b border-gray-50 pb-2 text-sm">
                    <div class="flex justify-between font-bold text-gray-700">
                        <span>${item.displayName}</span>
                        <span>$${item.price * item.qty}</span>
                    </div>
                    <div class="flex justify-between items-center mt-1">
                        <div class="flex gap-2 bg-gray-100 rounded-lg px-2 py-1 items-center">
                            <button class="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm" onclick="updateQty('${item.cartKey}', -1)">-</button>
                            <span class="w-4 text-center font-bold">${item.qty}</span>
                            <button class="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm" onclick="updateQty('${item.cartKey}', 1)">+</button>
                        </div>
                        <button onclick="updateQty('${item.cartKey}', -100)" class="text-xs text-red-400">移除</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = total; 
            document.getElementById('cart-count').innerText = count + " 份";
            if(shopIsOpen) {
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('submit-btn').innerText = "確認送出訂單";
            }
        }

        function closeModal() { 
            document.getElementById('success-modal').classList.add('hidden'); 
        }
    </script>
</body>
</html>
